{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto;">

    <h2>Add a New Book</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('create_post') }}">

        <label>Title:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" placeholder="example.jpg" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required>
            <option value="">Select a category</option>
            {% for cat in categories %}
                <option value="{{ cat['categoryId'] }}">
                    {{ cat['categoryName'] }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Read Now (0 or 1):</label><br>
        <select name="readNow" required>
            <option value="0">0</option>
            <option value="1">1</option>
        </select><br><br>

        <button type="submit">Submit</button>
        <a href="{{ url_for('read') }}">Cancel</a>

    </form>

</main>
{% endblock %}
